<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AHK AutoClicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.logo span {
  color: #00f5d4;
}

.btn-download {
  background: #00f5d4;
  border: none;
  padding: 12px 25px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.hero {
  display: flex;
  justify-content: space-between;
  padding: 80px;
  align-items: center;
}

.text h1 {
  font-size: 60px;
}

.text span {
  color: #00f5d4;
}

.text p {
  color: #94a3b8;
}

.features {
  margin-top: 20px;
}

.features div {
  margin: 10px 0;
}

.buttons {
  margin-top: 20px;
}

.btn {
  padding: 15px 25px;
  border-radius: 12px;
  border: none;
  margin-right: 10px;
  cursor: pointer;
}

.primary {
  background: #00f5d4;
}

.secondary {
  background: transparent;
  border: 1px solid #334155;
  color: white;
}

.mockup {
  background: #020617;
  border: 1px solid #00f5d4;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 40px rgba(0,255,200,0.2);
}

.mockup img {
  width: 500px;
  border-radius: 10px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 80px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  width: 200px;
  text-align: center;
  border: 1px solid #1e293b;
}

footer {
  text-align: center;
  padding: 40px;
  color: #64748b;
}
</style>

</head>

<body>

<header>
  <div class="logo">AHK <span>AutoClicker</span></div>
  <button class="btn-download">Baixar Agora</button>
</header>

<section class="hero">

  <div class="text">
    <h1>AHK <span>AutoClicker</span></h1>
    <p>Precisão, performance e controle total.</p>

    <div class="features">
      <div>✔ Clique de alta precisão</div>
      <div>✔ Configurações avançadas</div>
      <div>✔ Seguro e leve</div>
      <div>✔ Atualizações constantes</div>
    </div>

    <div class="buttons">
      <button class="btn primary">Baixar Agora</button>
      <button class="btn secondary">Ver Recursos</button>
    </div>
  </div>

  <div class="mockup">
    <!-- COLOCA SUA IMAGEM AQUI -->
    <img src="SEU_PRINT.png">
  </div>

</section>

<section class="cards">
  <div class="card">🛡️ Seguro</div>
  <div class="card">⚡ Alta performance</div>
  <div class="card">⚙️ Configurável</div>
  <div class="card">🔄 Atualizado</div>
</section>

<footer>
© 2026 AHK AutoClicker
</footer>

</body>
</html>
