<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vortex Client</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      margin-top: 100px;
    }

    .title {
      font-size: 50px;
      font-weight: bold;
    }

    .subtitle {
      color: #94a3b8;
      margin: 20px;
    }

    .download-btn {
      background: #22c55e;
      padding: 15px 30px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .download-btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .features {
      margin-top: 100px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>Vortex Client</header>

<div class="container">
  <div class="title">O melhor AutoClicker</div>
  <div class="subtitle">Rápido, leve e configurável</div>

  <button class="download-btn" onclick="download()">Baixar Agora</button>
</div>

<div class="features">
  <div class="card">⚡ Alto desempenho</div>
  <div class="card">🎯 CPS configurável</div>
  <div class="card">🛡️ Seguro</div>
</div>

<footer>© 2026 Vortex Client</footer>

<script>
function download() {
  window.location.href = "https://seulink.com/download.exe";
}
</script>

</body>
</html>
